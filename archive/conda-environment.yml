name: tms_fmri
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip

  # probably compatible with quadro driver
  - pytorch::pytorch=2.3.1
  - pytorch::torchvision=0.18.1
  - pytorch::pytorch-cuda=12.1

  # probably also compatible
  - numpy=1.26.4
  - pandas=2.2.2
  - scipy=1.13.1
  - scikit-learn=1.5.1
  - matplotlib=3.9.1
  - seaborn=0.13.2

  # neuroimaging stuff
  - nibabel=5.3.0
  - nilearn=0.10.4

  # jupyter/vs code kernel
  - ipykernel=6.29.5
  - ipywidgets=8.1.3
  - tqdm=4.66.4
  - jupyter_client>=8.0

  - pip:
      # MONAI
      - monai==1.3.2
      # S3 / OpenNeuro access
      - s3fs==2024.6.1
      - boto3==1.35.5
      - openneuro-py==2024.3.0
      # fsspec pinned to avoid gcsfs conflict?
      - fsspec==2024.6.1
